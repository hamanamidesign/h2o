<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>水質調査アプリ</title>

  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="水質調査">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-h2o-192.png">
  <link rel="apple-touch-icon" href="./icon-h2o-192.png">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f0f8ff;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      padding: 24px;
    }

    img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      max-width: 280px;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
    }
  </style>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxVXV1VXFAhUqZX972ewB4IL71OD0Am6gCKevLBzV0a-1IA_JAGsZzv154aW5pf-1Mzrg/exec";

    function openApp() {
      location.replace(GAS_URL);
    }

    window.onload = function() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

      if (isStandalone) {
        openApp();
      }
    };
  </script>
</head>
<body>
  <div class="box">
    <img src="./icon-h2o-192.png" alt="水質調査アプリ">
    <h1>水質調査アプリ</h1>
    <button onclick="openApp()">起動する</button>
  </div>
</body>
</html>
